<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PC Remote">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="PC Media Remote - iPhone 远程控制 Windows 电脑">

    <title>PC Remote</title>

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- 样式 -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- ============================================================ -->
    <!--  连接状态顶部指示条 -->
    <!-- ============================================================ -->
    <header id="header-bar">
        <div class="header-left">
            <span class="header-dot" id="status-dot"></span>
            <span id="pc-name-display">未连接</span>
        </div>
        <div class="header-right">
            <span id="clock-display">--:--</span>
        </div>
    </header>

    <!-- ============================================================ -->
    <!--  主内容区域 (滚动) -->
    <!-- ============================================================ -->
    <main id="main-content">

        <!-- PIN 验证界面 (首次使用或未验证时显示) -->
        <section id="pin-section" class="glass-card hidden">
            <div class="pin-header">
                <span class="lock-icon">🔒</span>
                <h2>验证身份</h2>
                <p>请输入 4 位数字 PIN 码</p>
            </div>
            <div class="pin-input-row">
                <input type="tel" id="pin-input" maxlength="4" pattern="[0-9]*" inputmode="numeric"
                       placeholder="0000" autocomplete="one-time-code">
            </div>
            <button id="pin-submit-btn" class="glass-btn primary-btn">验证</button>
            <p id="pin-error" class="error-text hidden">PIN 码错误，请重试</p>
        </section>

        <!-- 连接界面 (未连接时显示) -->
        <section id="connect-section" class="glass-card">
            <div class="connect-header">
                <div class="app-icon">🎵</div>
                <h1>PC Media Remote</h1>
                <p>控制你的 Windows 电脑</p>
            </div>

            <!-- 二维码扫码连接 (最可靠方式) -->
            <div class="qrcode-area">
                <button id="qrcode-btn" class="glass-btn qrcode-btn" onclick="toggleQRCode()">
                    <span class="btn-icon">📷</span>
                    <span>扫码连接 (推荐)</span>
                </button>
                <div id="qrcode-container" class="qrcode-container hidden">
                    <img id="qrcode-img" src="/qrcode.png" alt="扫描二维码连接" onerror="this.style.display='none'">
                    <p class="qrcode-url" id="qrcode-url-text"></p>
                    <p class="hint-text">用 iPhone 相机扫描二维码即可打开</p>
                </div>
            </div>

            <div class="divider"><span>或</span></div>

            <div class="auto-scan-area">
                <button id="scan-btn" class="glass-btn">
                    <span class="btn-icon">🔍</span>
                    <span>扫描局域网设备</span>
                </button>
                <p id="scan-status" class="hint-text"></p>
                <div id="found-servers" class="server-list"></div>
            </div>

            <div class="divider"><span>或手动输入</span></div>

            <div class="manual-connect">
                <input type="text" id="ip-input" placeholder="192.168.1.100:8080"
                       inputmode="url" autocomplete="off">
                <button id="connect-btn" class="glass-btn primary-btn">连接</button>
            </div>

            <p class="saved-ip-hint hidden" id="saved-ip-hint">
                <span>最近: </span><a href="#" id="use-saved-ip"></a>
            </p>
        </section>

        <!-- ============================================================ -->
        <!--  主遥控界面 (连接成功后显示) -->
        <!-- ============================================================ -->
        <section id="remote-section" class="hidden">

            <!-- 歌曲信息卡片 -->
            <div class="song-card glass-card" id="song-card">
                <div class="song-cover" id="song-cover">
                    <span class="cover-placeholder">🎶</span>
                    <img id="cover-img" src="" alt="" class="hidden">
                </div>
                <div class="song-info">
                    <p class="song-title" id="song-title">未在播放</p>
                    <p class="song-artist" id="song-artist"></p>
                    <p class="song-source" id="song-source"></p>
                </div>
                <div class="song-status" id="song-status"></div>
            </div>

            <!-- 播放进度条 -->
            <div class="progress-container" id="progress-container">
                <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1" disabled>
                <div class="progress-times">
                    <span id="time-current">00:00</span>
                    <span id="time-total">00:00</span>
                </div>
            </div>

            <!-- 播放控制 — 主按钮行 (5键 Apple 风格) -->
            <div class="transport-controls">
                <button class="ctrl-btn" id="btn-previous" title="上一首">⏮</button>
                <button class="ctrl-btn" id="btn-backward" title="后退10秒">⏪</button>
                <button class="ctrl-btn ctrl-btn-large" id="btn-playpause" title="播放/暂停"><span>▶</span></button>
                <button class="ctrl-btn" id="btn-forward" title="快进10秒">⏩</button>
                <button class="ctrl-btn" id="btn-next" title="下一首">⏭</button>
            </div>

            <!-- 辅助按钮行: 全屏 + 倍速 -->
            <div class="aux-controls">
                <button class="aux-btn" id="btn-fullscreen" title="全屏">⛶ 全屏</button>
                <div class="speed-chips">
                    <button class="speed-chip" data-speed="0.5">0.5x</button>
                    <button class="speed-chip active" data-speed="1.0">1x</button>
                    <button class="speed-chip" data-speed="1.5">1.5x</button>
                    <button class="speed-chip" data-speed="2.0">2x</button>
                </div>
            </div>

            <!-- 倍速控制 -->
            <!-- 音量控制卡片 -->
            <div class="volume-card glass-card">
                <div class="volume-row">
                    <button class="vol-btn" id="btn-vol-down">🔉</button>
                    <div class="volume-slider-container">
                        <input type="range" id="volume-slider" min="0" max="100" value="50" step="1">
                    </div>
                    <button class="vol-btn" id="btn-vol-up">🔊</button>
                </div>
                <div class="volume-info">
                    <span id="volume-percent">50%</span>
                    <button class="mute-btn" id="btn-mute" title="静音">
                        <span id="mute-icon">🔇</span>
                    </button>
                </div>
            </div>


            <!-- 系统控制卡片 -->
            <div class="system-card glass-card">
                <div class="card-title">⚙️ 系统控制</div>
                <div class="sys-controls">
                    <button class="sys-btn" id="btn-lock">
                        <span>🔒</span>
                        <span class="sys-label">锁定</span>
                    </button>
                    <button class="sys-btn" id="btn-sleep">
                        <span>😴</span>
                        <span class="sys-label">息屏</span>
                    </button>
                    <button class="sys-btn sys-btn-danger" id="btn-shutdown">
                        <span>⏻</span>
                        <span class="sys-label">关机</span>
                    </button>
                    <button class="sys-btn sys-btn-danger" id="btn-restart">
                        <span>🔄</span>
                        <span class="sys-label">重启</span>
                    </button>
                </div>
            </div>

        </section>
    </main>

    <!-- ============================================================ -->
    <!--  确认对话框 (关机/重启) -->
    <!-- ============================================================ -->
    <div id="confirm-dialog" class="dialog-overlay hidden">
        <div class="dialog glass-card">
            <p id="confirm-msg">确定要关机吗？</p>
            <div class="dialog-btns">
                <button class="glass-btn" id="confirm-cancel">取消</button>
                <button class="glass-btn danger-btn" id="confirm-ok">确定</button>
            </div>
        </div>
    </div>

    <!-- Toast 消息 -->
    <div id="toast" class="toast hidden"></div>

    <!-- JavaScript -->
    <script src="/static/js/app.js"></script>
</body>
</html>
